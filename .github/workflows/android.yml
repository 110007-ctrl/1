name: 🫣 Android CI

on:
  push:
    branches: [ "main", "tests" ]
  pull_request:
    branches: [ "main", "tests" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🥏 Checkout
      uses: actions/checkout@v4

    - name: ☕️ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: ⚡️ Make Gradle Executable
      run: chmod +x gradlew

    - name: 🔧 Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: 🎪 Configure Firebase & Build Variant
      id: config
      run: |
        # Check if the secret exists
        if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
          echo "GOOGLE_SERVICES_JSON found. Enabling Crashlytics via Website variant."
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          # Using WebsiteFullRelease to ensure Crashlytics is applied per build.gradle logic
          echo "VARIANT=assembleWebsiteFullDebug" >> $GITHUB_ENV
          echo "IS_RELEASE=false" >> $GITHUB_ENV
        else
          echo "Secret missing. Falling back to De-Googled F-Droid build."
          echo "VARIANT=assembleFdroidFullDebug" >> $GITHUB_ENV
          echo "IS_RELEASE=false" >> $GITHUB_ENV
        fi

    - name: 🚂 Build with Gradle
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 15
        max_attempts: 3
        command: ./gradlew ${{ env.VARIANT }} --info --warning-mode all --no-configuration-cache

    - name: 🔍 Find Universal APK
      run: |
        echo "All APKs found:"
        find app/build/outputs/apk/ -name "*.apk"
        echo ""
        echo "Universal APK:"
        find app/build/outputs/apk/ -name "*universal*.apk"
        UNIVERSAL_APK=$(find app/build/outputs/apk/ -name "*universal*.apk" | head -1)
        echo "UNIVERSAL_APK=$UNIVERSAL_APK" >> $GITHUB_ENV

    - name: 📦 Upload APK
      if: success() && env.UNIVERSAL_APK != ''
      uses: actions/upload-artifact@v4
      with:
        name: rethink-dns-apk
        path: ${{ env.UNIVERSAL_APK }}

    - name: 📜 Upload Crashlytics Mapping File
      # Only upload mapping files if we built the release/website variant
      if: success() && env.IS_RELEASE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mapping-file
        path: app/build/outputs/mapping/websiteFullRelease/mapping.txt
